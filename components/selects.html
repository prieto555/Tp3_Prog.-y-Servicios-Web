<section class="container py-4">
    <div
        class="p-4 rounded-4 border bg-white"
        style="border-color: #d4e3ef !important; box-shadow: 0 12px 30px rgba(10, 26, 47, 0.08);"
    >
        <h2 class="h4 fw-bold mb-4" style="color: #0a1a2f;">Selects</h2>

        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label for="selectDestino" class="form-label fw-semibold" style="color: #0a1a2f;">Destino</label>
                <select id="selectDestino" class="form-select" style="min-height: 48px; border-color: #d4e3ef;">
                    <option selected>Selecciona un destino</option>
                    <option value="patagonia">Patagonia</option>
                    <option value="norte">Norte argentino</option>
                    <option value="cuyo">Cuyo</option>
                </select>
            </div>

            <div class="col-12 col-md-6">
                <label for="selectOrden" class="form-label fw-semibold" style="color: #0a1a2f;">Ordenar por</label>
                <select id="selectOrden" class="form-select" style="min-height: 48px; border-color: #d4e3ef;">
                    <option selected>Mas populares</option>
                    <option value="precio-asc">Menor precio</option>
                    <option value="precio-desc">Mayor precio</option>
                    <option value="nuevos">Mas recientes</option>
                </select>
            </div>
        </div>
    </div>
</section>
