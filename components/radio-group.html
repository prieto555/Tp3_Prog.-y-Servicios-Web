<section class="container py-4">
    <div
        class="p-4 rounded-4 border bg-white"
        style="border-color: #d4e3ef !important; box-shadow: 0 12px 30px rgba(10, 26, 47, 0.08);"
    >
        <h2 class="h4 fw-bold mb-4" style="color: #0a1a2f;">Radio group</h2>

        <fieldset>
            <legend class="fs-6 fw-semibold mb-3" style="color: #0a1a2f;">Tipo de viaje</legend>

            <div class="d-flex flex-column gap-3">
                <label class="d-flex align-items-center gap-3 p-3 rounded-4 border" style="border-color: #d4e3ef !important;">
                    <input class="form-check-input m-0" type="radio" name="tipoViaje" value="aventura" checked>
                    <span>
                        <span class="d-block fw-semibold" style="color: #0a1a2f;">Aventura</span>
                        <span class="small text-secondary">Excursiones, trekking y experiencias activas.</span>
                    </span>
                </label>

                <label class="d-flex align-items-center gap-3 p-3 rounded-4 border" style="border-color: #d4e3ef !important;">
                    <input class="form-check-input m-0" type="radio" name="tipoViaje" value="cultural">
                    <span>
                        <span class="d-block fw-semibold" style="color: #0a1a2f;">Cultural</span>
                        <span class="small text-secondary">Museos, historia y recorridos urbanos.</span>
                    </span>
                </label>

                <label class="d-flex align-items-center gap-3 p-3 rounded-4 border" style="border-color: #d4e3ef !important;">
                    <input class="form-check-input m-0" type="radio" name="tipoViaje" value="relax">
                    <span>
                        <span class="d-block fw-semibold" style="color: #0a1a2f;">Relax</span>
                        <span class="small text-secondary">Escapadas tranquilas y descanso.</span>
                    </span>
                </label>
            </div>
        </fieldset>
    </div>
</section>
