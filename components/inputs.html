<section class="container py-4">
    <div
        class="p-4 rounded-4 border bg-white"
        style="border-color: #d4e3ef !important; box-shadow: 0 12px 30px rgba(10, 26, 47, 0.08);"
    >
        <h2 class="h4 fw-bold mb-4" style="color: #0a1a2f;">Inputs</h2>

        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label for="inputNombre" class="form-label fw-semibold" style="color: #0a1a2f;">Nombre</label>
                <input
                    type="text"
                    id="inputNombre"
                    class="form-control"
                    placeholder="Ingresa tu nombre"
                    style="min-height: 48px; border-color: #d4e3ef;"
                >
            </div>

            <div class="col-12 col-md-6">
                <label for="inputEmail" class="form-label fw-semibold" style="color: #0a1a2f;">Correo electronico</label>
                <input
                    type="email"
                    id="inputEmail"
                    class="form-control"
                    placeholder="nombre@correo.com"
                    style="min-height: 48px; border-color: #d4e3ef;"
                >
            </div>

            <div class="col-12">
                <label for="inputBusqueda" class="form-label fw-semibold" style="color: #0a1a2f;">Busqueda</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 bg-white" style="border-color: #d4e3ef;">Buscar</span>
                    <input
                        type="search"
                        id="inputBusqueda"
                        class="form-control border-start-0"
                        placeholder="Ej: escapadas al sur"
                        style="min-height: 48px; border-color: #d4e3ef;"
                    >
                </div>
            </div>
        </div>
    </div>
</section>
